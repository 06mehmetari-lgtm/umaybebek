<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Umay Uslu — Ben Geldim</title>
  <meta name="description" content="Umay bebeğimiz dünyaya geldi. Hastane ziyaretinize bekliyoruz." />
  <!-- Aşağıdaki script içinde HASTANE, ANNE_TEL, BABA_TEL değerlerini kendi bilgilerinizle değiştirin. -->
  <script>
    window.INVITATION = {
      hospitalMapsQuery: "Hastane Adresi Şehir",
      anneWhatsApp: "905XXXXXXXXX",
      babaWhatsApp: "905XXXXXXXXX"
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #faf8f5;
      --blush: #f5e6e8;
      --rose: #e8c4c9;
      --gold: #c9a962;
      --text: #3d3530;
      --text-soft: #6b625c;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
    }
    .page::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, var(--blush) 0%, transparent 55%),
                  radial-gradient(ellipse 60% 40% at 80% 80%, rgba(232,196,201,0.4) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .badge {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 12vw, 4.5rem);
      font-weight: 600;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 0.35em;
    }
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      font-style: italic;
      color: var(--text-soft);
      margin-bottom: 2.5rem;
    }
    .intro {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--text-soft);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .family {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 1.75rem 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(232,196,201,0.4);
    }
    .family-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    .family-row:last-child { margin-bottom: 0; }
    .family-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--gold);
      margin-bottom: 0.25rem;
    }
    .family-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
    }
    .cta {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      color: var(--text);
      margin-bottom: 1.75rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem 1.5rem;
      border-radius: 999px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn:active { transform: scale(0.98); }
    .btn-maps {
      background: var(--text);
      color: var(--cream);
      box-shadow: 0 4px 20px rgba(61,53,48,0.2);
    }
    .btn-maps:hover { box-shadow: 0 6px 24px rgba(61,53,48,0.3); }
    .btn-wa {
      background: #25D366;
      color: #fff;
      box-shadow: 0 4px 20px rgba(37,211,102,0.35);
    }
    .btn-wa:hover { box-shadow: 0 6px 24px rgba(37,211,102,0.45); }
    .btn-wa.anne { background: linear-gradient(135deg, #e8c4c9, #d4a5ab); color: #3d3530; box-shadow: 0 4px 20px rgba(232,196,201,0.5); }
    .btn-wa.anne:hover { box-shadow: 0 6px 24px rgba(232,196,201,0.6); }
    .music-bar {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(201,169,98,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }
    .music-bar span {
      font-size: 0.8rem;
      color: var(--text-soft);
    }
    .music-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--blush);
      border: 1px solid var(--rose);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }
    .music-btn:hover { background: var(--rose); transform: scale(1.05); }
    .music-btn svg { width: 20px; height: 20px; }
    .music-btn.paused .icon-play { display: block; }
    .music-btn.paused .icon-pause { display: none; }
    .music-btn.playing .icon-play { display: none; }
    .music-btn.playing .icon-pause { display: block; }
    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-soft);
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <p class="badge">Dünyaya hoş geldin</p>
      <h1>Umay</h1>
      <p class="tagline">Ben geldim</p>
      <p class="intro">Bebeğimiz dünyaya geldi. Hastane ziyaretinize çok mutlu olacağız.</p>

      <div class="family">
        <div class="family-row">
          <div>
            <div class="family-label">Anne</div>
            <div class="family-name">Ebriu Uslu</div>
          </div>
        </div>
        <div class="family-row">
          <div>
            <div class="family-label">Baba</div>
            <div class="family-name">Niyazi Uslu</div>
          </div>
        </div>
        <div class="family-row">
          <div>
            <div class="family-label">Abiler</div>
            <div class="family-name">Çağan · Çağlar · Çağrı</div>
          </div>
        </div>
      </div>

      <p class="cta">Hastane ziyaretine bekleriz</p>

      <div class="links">
        <a class="btn btn-maps" id="mapsLink" href="#" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Hastane adresi (Haritalar)
        </a>
        <a class="btn btn-wa anne" id="anneLink" href="#" target="_blank" rel="noopener">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Anne — WhatsApp
        </a>
        <a class="btn btn-wa" id="babaLink" href="#" target="_blank" rel="noopener">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Baba — WhatsApp
        </a>
      </div>

      <div class="music-bar">
        <button type="button" class="music-btn paused" id="musicBtn" aria-label="Müziği çal">
          <span class="icon-play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
          <span class="icon-pause"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></span>
        </button>
        <span id="musicLabel">Bebek ninnisi</span>
      </div>

      <footer>Uslu ailesi · Umay</footer>
    </div>
  </div>

  <audio id="lullaby" loop preload="auto">
    <source src="https://assets.mixkit.co/music/preview/mixkit-lullaby-cradle-song-309.mp3" type="audio/mpeg" />
  </audio>

  <script>
    (function () {
      var c = window.INVITATION || {};
      var mapsLink = document.getElementById('mapsLink');
      var anneLink = document.getElementById('anneLink');
      var babaLink = document.getElementById('babaLink');
      if (mapsLink && c.hospitalMapsQuery) {
        mapsLink.href = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(c.hospitalMapsQuery);
      }
      if (anneLink && c.anneWhatsApp) anneLink.href = 'https://wa.me/' + c.anneWhatsApp.replace(/\D/g, '');
      if (babaLink && c.babaWhatsApp) babaLink.href = 'https://wa.me/' + c.babaWhatsApp.replace(/\D/g, '');
    })();
    (function () {
      var audio = document.getElementById('lullaby');
      var btn = document.getElementById('musicBtn');
      var label = document.getElementById('musicLabel');
      if (!audio || !btn) return;

      function updateBtn() {
        btn.classList.toggle('paused', audio.paused);
        btn.classList.toggle('playing', !audio.paused);
        label.textContent = audio.paused ? 'Bebek ninnisi' : 'Çalıyor';
      }

      btn.addEventListener('click', function () {
        if (audio.paused) {
          audio.play().catch(function () {});
        } else {
          audio.pause();
        }
        updateBtn();
      });

      audio.addEventListener('play', updateBtn);
      audio.addEventListener('pause', updateBtn);
      updateBtn();
    })();
  </script>
</body>
</html>
